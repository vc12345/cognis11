<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Lattice | Cognis 11+</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
    
    <style>
        /* DASHBOARD SPECIFIC OVERRIDES & GUIDE STYLES */
        .lattice-header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .category-legend {
            display: flex;
            gap: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .mod-id {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.65rem;
            color: var(--cognis-blue);
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/nav-injector.js"></script>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="dashboard-container">
        <header class="welcome-section">
            <div class="header-left">
                <h1 id="user-greeting">Learning Lattice.</h1>
                <div class="status-bar">
                    <span id="user-welcome">Syncing your progress...</span>
                    <span class="dot-separator">•</span>
                    <span id="account-status" class="status-badge status-checking">Checking Status</span>
                </div>
            </div>
        </header>

        <div class="lattice-header">
            <div class="category-legend">
                <div class="legend-item">
                    <span class="legend-dot" style="background: var(--pillar-core);"></span>
                    Core Maths
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background: var(--pillar-verbal);"></span>
                    Verbal Reasoning
                </div>
                <div class="legend-item">
                    <span class="legend-dot" style="background: var(--pillar-non-verbal);"></span>
                    Non-Verbal Reasoning
                </div>
            </div>
            <div style="font-size: 0.8rem; color: #94a3b8; font-weight: 500;">
                Sequential Unlocking Active
            </div>
        </div>

        <main id="lattice-root"></main>
    </div>

    <script src="../js/registry.js"></script>
    <script>
        // Expansion Helper for QC requirements
        const expandAcronym = (name) => {
            if (name === "VR") return "Verbal Reasoning";
            if (name === "NVR") return "Non-Verbal Reasoning";
            return name;
        };

        async function loadDashboard() {
            if (!window.supabaseClient) {
                setTimeout(loadDashboard, 100);
                return;
            }

            try {
                // 1. Authenticate
                const { data: { user }, error: authError } = await window.supabaseClient.auth.getUser();
                if (authError || !user) {
                    window.location.href = "/login.html";
                    return;
                }
                document.getElementById('user-welcome').innerText = user.email;

                // 2. Fetch Profile & Plan
                const { data: profile } = await window.supabaseClient
                    .from('profiles')
                    .select('subscription_status, subscription_plan')
                    .eq('id', user.id)
                    .maybeSingle();

                const statusEl = document.getElementById('account-status');
                let userPlan = 'none';
                
                if (profile) {
                    userPlan = profile.subscription_plan || 'none';
                    const status = profile.subscription_status || 'inactive';
                    statusEl.innerText = `${status.toUpperCase()} PLAN: ${userPlan.toUpperCase()}`;
                    statusEl.className = `status-badge status-${status}`;
                }

                // 3. Fetch Completion Data
                const { data: completedData } = await window.supabaseClient
                    .from('module_progress')
                    .select('module_id')
                    .eq('user_id', user.id);

                const completedIds = completedData ? completedData.map(item => Number(item.module_id)) : [];
                
                // UNLOCK CALCULATION (Sequential for Foundational)
                const maxCompleted = completedIds.length > 0 ? Math.max(...completedIds) : 0;
                const nextUnlockedId = maxCompleted + 1;

                // 4. Render the Lattice
                const root = document.getElementById('lattice-root');
                root.innerHTML = ''; 
                
                // Extract unique pillars from registry
                const pillars = [...new Set(COGNIS_MODULES.map(m => m.pillar))];

                pillars.forEach(pillarName => {
                    const expandedName = expandAcronym(pillarName);
                    const section = document.createElement('section');
                    section.className = 'pillar-section';
                    section.innerHTML = `
                        <div class="pillar-header">
                            <span class="pillar-indicator" style="background: var(--pillar-${pillarName.toLowerCase()})"></span>
                            <h2>${expandedName}</h2>
                        </div>
                        <div class="category-grid" id="group-${pillarName}"></div>
                    `;
                    root.appendChild(section);
                    
                    const groupContainer = document.getElementById(`group-${pillarName}`);

                    COGNIS_MODULES.filter(m => m.pillar === pillarName).forEach(mod => {
                        const modId = Number(mod.id);
                        const isDone = completedIds.includes(modId);
                        let isLocked = false;

                        // ENFORCE SEQUENTIAL LOCK FOR FOUNDATIONAL
                        if (userPlan === 'foundational' && modId > 1) {
                            if (modId > nextUnlockedId) isLocked = true;
                        }

                        // Create the element (Div if locked, A if clickable)
                        const card = document.createElement(isLocked ? 'div' : 'a');
                        card.className = `module-card ${isDone ? 'is-complete' : ''} ${isLocked ? 'is-locked' : ''}`;
                        if (!isLocked) card.href = mod.path;
                        
                        card.innerHTML = `
                            <div class="card-top">
                                <span class="cat-tag">Category ${mod.cat}</span>
                                ${isDone ? '<span class="check-mark">✓</span>' : ''}
                                ${isLocked ? '<span class="lock-tag">Locked 🔒</span>' : ''}
                            </div>
                            <h3 class="mod-title">${mod.title}</h3>
                            <div class="card-bottom">
                                <span class="mod-id">MODULE ${String(modId).padStart(2, '0')}</span>
                                <span class="status-text">
                                    ${isLocked ? 'Complete previous module' : (isDone ? 'Revision Ready' : 'Start Module →')}
                                </span>
                            </div>
                        `;
                        groupContainer.appendChild(card);
                    });
                });
            } catch (err) {
                console.error("Dashboard Render Error:", err);
            }
        }
        loadDashboard();
    </script>
</body>
</html>
