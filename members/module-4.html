<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 4: Inverse Proportion | Cognis11</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="js/logic-provider.js"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #b45309; --bg: #f8fafc; --text: #0f172a; --trap: #be123c; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .engine-controls { display: grid; gap: 20px; background: #fff7ed; padding: 20px; border-radius: 8px; border: 1px solid #ffedd5; }
        .slider-group { display: flex; align-items: center; gap: 15px; }
        .slider-group label { min-width: 150px; font-weight: 600; }
        input[type=range] { flex-grow: 1; accent-color: var(--accent); }
        .work-viz { display: flex; align-items: flex-end; justify-content: space-around; height: 150px; margin: 30px 0; border-bottom: 2px solid #cbd5e1; }
        .bar { width: 60px; background: #3b82f6; position: relative; transition: height 0.3s ease; }
        .bar-label { position: absolute; top: -25px; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; }
        .question-card { background: white; border: 2px solid var(--primary); padding: 20px; border-radius: 8px; font-size: 1.2rem; text-align: center; font-style: italic; }
        .btn { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; }
        .logic-card { background: #fef3c7; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }
        .saboteur-section { background: #fff1f2; border: 2px solid #fecdd3; padding: 25px; border-radius: 12px; }
        .trap-item { background: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #fda4af; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
<div class="container">
    <header style="text-align: center; margin-bottom: 40px;">
        <h1>Module 4: Inverse Proportion</h1>
    </header>

    <div class="section">
        <div class="engine-controls">
            <div class="slider-group"><label>Original Builders: <span id="w1-val">2</span></label>
                <input type="range" id="w1" min="1" max="10" value="2"></div>
            <div class="slider-group"><label>Original Days: <span id="d1-val">10</span></label>
                <input type="range" id="d1" min="1" max="20" value="10"></div>
            <div class="slider-group"><label>New Builders: <span id="w2-val">4</span></label>
                <input type="range" id="w2" min="1" max="10" value="4"></div>
        </div>

        <div class="work-viz">
            <div id="bar1" class="bar"><span class="bar-label">Before</span></div>
            <div id="bar2" class="bar" style="background: var(--accent);"><span class="bar-label">After</span></div>
        </div>

        <div class="question-card" id="q-text"></div>
        <button class="btn" onclick="toggleLogic()">Expose the Calculation</button>

        <div id="logic" class="logic-card">
            <p id="total-work-text"></p>
            <p id="final-calc-text"></p>
            <p><strong>Result:</strong> <span id="correct-ans"></span></p>
        </div>
    </div>

    <div class="section saboteur-section">
        <h2>Phase 4: The Saboteur</h2>
        <div class="trap-item"><span>The Linear Trap:</span> <span id="trap-linear" style="color:red; font-weight:bold;"></span></div>
        <div class="trap-item"><span>The Subtraction Trap:</span> <span id="trap-sub" style="color:red; font-weight:bold;"></span></div>
    </div>
</div>

<script>
    const w1In = document.getElementById('w1');
    const d1In = document.getElementById('d1');
    const w2In = document.getElementById('w2');

    function update() {
        const res = LogicProvider.getModule(4).generate(w1In.value, d1In.value, w2In.value);
        document.getElementById('w1-val').innerText = res.inputs.workers;
        document.getElementById('d1-val').innerText = res.inputs.days;
        document.getElementById('w2-val').innerText = res.inputs.newWorkers;
        document.getElementById('bar1').style.height = (res.inputs.days * 6) + 'px';
        document.getElementById('bar2').style.height = (res.answers.correct * 6) + 'px';
        document.getElementById('q-text').innerText = `If ${res.inputs.workers} builders take ${res.inputs.days} days, how many days for ${res.inputs.newWorkers}?`;
        document.getElementById('total-work-text').innerText = `${res.inputs.workers} × ${res.inputs.days} = ${res.inputs.totalWorkUnits} Work Units.`;
        document.getElementById('final-calc-text').innerText = `${res.inputs.totalWorkUnits} ÷ ${res.inputs.newWorkers} = ${res.answers.correct} Days.`;
        document.getElementById('correct-ans').innerText = res.answers.correct;
        document.getElementById('trap-linear').innerText = res.answers.traps.linearMore;
        document.getElementById('trap-sub').innerText = res.answers.traps.subtraction;
    }

    function toggleLogic() {
        const div = document.getElementById('logic');
        div.style.display = div.style.display === 'none' ? 'block' : 'none';
    }

    [w1In, d1In, w2In].forEach(el => el.oninput = update);
    update();
</script>
</body>
</html>
