<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Module 54: Tone & Purpose Simulator</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f4f4f4; color: #002d5b; padding: 20px; }
        #module-container { max-width: 850px; margin: auto; background: white; padding: 40px; border-radius: 0; border-top: 8px solid #002d5b; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .phase-title { font-size: 0.85em; font-weight: bold; text-transform: uppercase; color: #c5a059; letter-spacing: 2px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* The Engine Styles */
        .simulator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .control-panel { background: #eef2f7; padding: 20px; border-radius: 4px; }
        .output-panel { background: #fff; border: 2px solid #002d5b; padding: 20px; display: flex; align-items: center; justify-content: center; text-align: center; font-style: italic; font-size: 1.2em; min-height: 100px; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: #002d5b; }
        
        #trace-log { 
            margin-top: 20px;
            font-family: 'Consolas', 'Lucida Console', monospace; 
            background: #1a1a1a; 
            color: #00ff00; 
            padding: 15px; 
            height: 140px; 
            overflow-y: auto; 
            font-size: 0.85em;
            line-height: 1.4;
        }

        .label-row { display: flex; justify-content: space-between; font-size: 0.75em; font-weight: bold; margin-bottom: 10px; color: #666; }
    </style>
</head>
<body>

<div id="module-container">
    <div class="phase-title">Phase 3: The Engine</div>
    
    <div class="simulator-grid">
        <div class="control-panel">
            <label><strong>Tone Intensity Slider</strong></label>
            <div class="label-row">
                <span>CLINICAL</span>
                <span>SARCASTIC</span>
                <span>AGGRESSIVE</span>
            </div>
            <input type="range" id="toneSlider" min="0" max="2" value="0" step="1" oninput="updateSimulator()">
            
            <p style="font-size: 0.8em; margin-top: 20px;">Move the slider to see how word choice alters the <strong>Purpose</strong> of the statement.</p>
        </div>
        
        <div class="output-panel" id="displayText">
            The weather is currently raining.
        </div>
    </div>

    <div id="trace-log">> System Ready. Awaiting parameter input...</div>
</div>

<script>
    const slider = document.getElementById('toneSlider');
    const display = document.getElementById('displayText');
    const log = document.getElementById('trace-log');

    const data = [
        { 
            text: "The weather is currently raining.", 
            tone: "Clinical / Neutral", 
            purpose: "To Inform (Data-led)", 
            color: "#002d5b",
            size: "1em"
        },
        { 
            text: "What a 'lovely' day for a picnic, isn't it?", 
            tone: "Sarcastic / Ironical", 
            purpose: "To Ridicule (Hidden meaning)", 
            color: "#c5a059",
            size: "1.2em"
        },
        { 
            text: "This wretched downpour has utterly ruined everything!", 
            tone: "Aggressive / Emotive", 
            purpose: "To Complain (Emotion-led)", 
            color: "#d9534f",
            size: "1.4em"
        }
    ];

    function updateLog(msg) {
        const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        log.innerHTML += `<br>[${time}] ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    function updateSimulator() {
        const val = slider.value;
        const current = data[val];
        
        display.innerText = current.text;
        display.style.color = current.color;
        display.style.fontSize = current.size;
        
        updateLog(`Tone Shift Detected: ${current.tone.toUpperCase()}`);
        updateLog(`Purpose identified as: ${current.purpose}`);
        updateLog(`Primary Keyword Weight: ${val == 0 ? 'Low' : val == 1 ? 'Medium' : 'High'}`);
    }
    
    // Initial run
    updateLog("Initializing Module 54...");
</script>

</body>
</html>
