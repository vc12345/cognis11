<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A4 · Start Unknown — Cognis11</title>
  <link rel="stylesheet" href="/assets/style.css">
  <script src="https://api.memberstack.com/static/memberstack.js?custom"
    data-memberstack-app="YOUR_APP_ID"></script>
</head>
<body>

  <nav>
    <a href="/members/">← All question types</a>
    <span>A4 · Start Unknown</span>
    <button onclick="markDone('A4')" id="doneBtn">Mark as done ✓</button>
  </nav>

  <main>

    <div class="type-header">
      <div class="type-code">A4</div>
      <h1>Start Unknown / Reversal</h1>
      <div class="age-tabs">
        <button class="age-tab active" onclick="showAge('standard')">Standard · Y2–3</button>
        <button class="age-tab" onclick="showAge('high')">High · Y3–4</button>
        <button class="age-tab" onclick="showAge('extended')">Extended · Y4–5</button>
      </div>
    </div>

    <!-- STANDARD -->
    <div class="age-content" id="age-standard">

      <section class="parent-note">
        <h2>For parents</h2>
        <p><!-- paste parent note here --></p>
      </section>

      <section class="signal-card">
        <h2>Signal card <span>(read this to your child)</span></h2>
        <blockquote><!-- paste signal card here --></blockquote>
      </section>

      <section class="stems">
        <h2>Opening sentences <span>(20 items — child classifies, doesn't solve)</span></h2>
        <ol><!-- paste 20 stems here as <li> items --></ol>
      </section>

      <section class="near-misses">
        <h2>Near-miss pairs <span>(discrimination training)</span></h2>
        <!-- paste near-miss pairs here -->
      </section>

      <section class="mastery-check">
        <h2>Mastery check</h2>
        <!-- paste mastery check here -->
      </section>

    </div>

    <!-- HIGH -->
    <div class="age-content hidden" id="age-high">
      <!-- same structure, different content -->
    </div>

    <!-- EXTENDED -->
    <div class="age-content hidden" id="age-extended">
      <!-- same structure, different content -->
    </div>

  </main>

  <script src="/assets/progress.js"></script>
  <script>
    function showAge(level) {
      document.querySelectorAll('.age-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.age-tab').forEach(el => el.classList.remove('active'));
      document.getElementById('age-' + level).classList.remove('hidden');
      event.target.classList.add('active');
    }

    // Restore done state
    if (localStorage.getItem('done_A4') === 'true') {
      document.getElementById('doneBtn').classList.add('done');
      document.getElementById('doneBtn').textContent = '✓ Done';
    }
  </script>
</body>
</html>
