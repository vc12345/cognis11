<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Module 36: Anagram Chamber | Cognis11</title>
    <style>
        :root { --cognis-blue: #002d5b; --cognis-gold: #c5a059; --cognis-light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: #eaeff2; padding: 40px 20px; color: #2c3e50; }
        .module-card { max-width: 950px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: var(--cognis-blue); color: white; padding: 25px 40px; border-bottom: 4px solid var(--cognis-gold); }
        .header h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        .phase { padding: 35px 40px; border-bottom: 1px solid #edf2f7; }
        .phase h2 { font-size: 0.8rem; color: var(--cognis-gold); text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }

        .question-tiers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .tier-card { background: var(--cognis-light); padding: 18px; border-radius: 12px; border-left: 4px solid var(--cognis-blue); font-size: 0.8rem; }
        .tier-card b { color: var(--cognis-blue); font-size: 0.65rem; text-transform: uppercase; display: block; margin-bottom: 8px; }

        .simulation-area { background: #1a202c; border-radius: 12px; padding: 40px; margin: 30px 0; text-align: center; }
        .chamber { background: #2d3748; border: 4px inset #4a5568; border-radius: 15px; padding: 30px; display: inline-flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-width: 320px; }
        .tile { width: 55px; height: 55px; background: #fefefe; border-radius: 10px; border-bottom: 5px solid #cbd5e0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; color: #1a202c; transition: 0.2s; }
        
        @keyframes shake {
            0% { transform: rotate(0deg) translate(0,0); }
            25% { transform: rotate(5deg) translate(2px, -2px); }
            75% { transform: rotate(-5deg) translate(-2px, 2px); }
            100% { transform: rotate(0deg) translate(0,0); }
        }
        .shake-active .tile { animation: shake 0.4s infinite; }

        .engine-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; background: #1a202c; color: white; padding: 30px; border-radius: 12px; }
        .btn-choice { background: #4a5568; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; width: 100%; text-align: left; display: flex; justify-content: space-between; }
        .btn-choice:hover { background: var(--cognis-gold); }
        .trace-log { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 0.85rem; border-left: 4px solid var(--cognis-gold); line-height: 1.8; }
    </style>
</head>
<body>
<div class="module-card">
    <div class="header"><h1>Module 36: Anagram Chamber</h1></div>
    <section class="phase">
        <h2>Phase 1: The X-Ray</h2>
        <div class="question-tiers">
            <div class="tier-card"><b>Advanced Year 2</b>Is <b>TAC</b> an anagram of <b>CAT</b>?</div>
            <div class="tier-card"><b>Average Year 4</b>Rearrange <b>LISTEN</b> to make a word for quiet.</div>
            <div class="tier-card"><b>Advanced Year 5</b>Find the pair in <b>DESSERT / DESERT / RESTED</b>.</div>
        </div>
    </section>

    <section class="phase">
        <h2>Phase 2: The Anatomy</h2>
        <div class="simulation-area">
            <div id="chamber" class="chamber"></div>
            <div style="margin-top: 30px;">
                <button onclick="shake()" style="background:var(--cognis-gold); color:white; border:none; padding:12px 30px; border-radius:8px; font-weight:bold; cursor:pointer; text-transform:uppercase;">Shake Inventory</button>
            </div>
        </div>
    </section>

    <section class="phase">
        <h2>Phase 3: The Engine</h2>
        <div class="engine-container">
            <div class="controls">
                <label style="font-size:0.6rem; color:#a0aec0; text-transform:uppercase; margin-bottom:10px; display:block;">Select Comparison Pair</label>
                <button class="btn-choice" onclick="loadPair('LISTEN', 'SILENT')">LISTEN / SILENT <span>Check</span></button>
                <button class="btn-choice" onclick="loadPair('HEART', 'EARTH')">HEART / EARTH <span>Check</span></button>
                <button class="btn-choice" onclick="loadPair('DORMITORY', 'DIRTY ROOM')">DORMITORY / DIRTY ROOM <span>Check</span></button>
                <button class="btn-choice" onclick="loadPair('DESSERT', 'DESERT')">DESSERT / DESERT <span>Check</span></button>
            </div>
            <div class="trace-log" id="trace-36">Compare alphabetical inventories...</div>
        </div>
    </section>
</div>

<script>
    function loadPair(w1, w2) {
        const chamber = document.getElementById('chamber');
        const clean1 = w1.replace(/\s/g, '').toUpperCase();
        const clean2 = w2.replace(/\s/g, '').toUpperCase();
        
        chamber.innerHTML = clean1.split('').map(l => `<div class="tile">${l}</div>`).join('');
        
        const sorted1 = clean1.split('').sort().join('');
        const sorted2 = clean2.split('').sort().join('');
        const isMatch = (sorted1 === sorted2);

        document.getElementById('trace-36').innerHTML = `
            <b>Inventory Comparison:</b><br>
            A: [${sorted1}]<br>
            B: [${sorted2}]<br><br>
            Result: <b style="color:${isMatch ? 'var(--cognis-gold)' : '#e53e3e'}">${isMatch ? 'MATCH (Anagram)' : 'NO MATCH'}</b>
        `;
    }

    function shake() {
        const area = document.querySelector('.simulation-area');
        area.classList.add('shake-active');
        setTimeout(() => area.classList.remove('shake-active'), 600);
    }

    window.onload = () => loadPair('LISTEN', 'SILENT');
</script>
</body>
</html>
