<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Cognis 11+</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy:#1B3A5C; --steel:#2E6DA4; --cream:#FAFAF6; --lgrey:#E5E3DD; --grey:#888; }
        body { font-family:'DM Sans', sans-serif; background:var(--cream); color:var(--navy); margin:0; padding:0; }
        
        .nav { background:#fff; border-bottom:1px solid var(--lgrey); padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
        .nav a { color:var(--navy); text-decoration:none; font-weight:600; font-size:0.9rem; }
        
        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        h1 { font-family:'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 30px; }
        
        .settings-card { background:#fff; border:1px solid var(--lgrey); border-radius:12px; padding:32px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .setting-row { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--lgrey); }
        .setting-row:last-child { border-bottom: none; }
        
        .label { font-weight: 700; font-size: 0.9rem; color: var(--navy); }
        .value { color: var(--grey); font-size: 0.95rem; }
        
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .badge-active { background: #E2F0E9; color: #276245; }
        .badge-inactive { background: #F4F2ED; color: #888; }
        
        .btn-manage { display: block; width: 100%; margin-top: 30px; padding: 15px; background: var(--navy); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-logout { display: block; text-align: center; margin-top: 20px; color: #d9534f; font-size: 0.85rem; text-decoration: none; font-weight: 600; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
</head>
<body>

<nav class="nav">
    <a href="/members/dashboard.html">← Back to Dashboard</a>
    <div style="font-weight: 700;">Account Settings</div>
</nav>

<div class="container">
    <h1>Your Account</h1>
    
    <div class="settings-card">
        <div class="setting-row">
            <div class="label">Email Address</div>
            <div class="value" id="user-email">Loading...</div>
        </div>
        
        <div class="setting-row">
            <div class="label">Subscription Status</div>
            <div id="status-container">
                <span class="badge badge-inactive">Checking...</span>
            </div>
        </div>

        <button class="btn-manage" onclick="redirectToStripePortal()">Manage Billing & Subscription</button>
    </div>
    
    <a href="#" class="btn-logout" onclick="handleLogout()">Sign Out</a>
</div>

<script>
    async function loadAccountData() {
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        
        if (!user) {
            window.location.href = "/login.html";
            return;
        }

        document.getElementById('user-email').textContent = user.email;

        const { data: profile } = await window.supabaseClient
            .from('profiles')
            .select('subscription_status')
            .eq('id', user.id)
            .single();

        const statusEl = document.getElementById('status-container');
        if (profile && profile.subscription_status === 'active') {
            statusEl.innerHTML = '<span class="badge badge-active">Active</span>';
        } else {
            statusEl.innerHTML = '<span class="badge badge-inactive">Inactive</span>';
        }
    }

    function handleLogout() {
        window.supabaseClient.auth.signOut().then(() => {
            window.location.href = "/login.html";
        });
    }

    function redirectToStripePortal() {
        // This will eventually point to a Supabase Edge Function 
        // that generates a Stripe Customer Portal link.
        alert("Billing management is being connected. Please contact hello@cognis11.com to manage your subscription manually for now.");
    }

    document.addEventListener('DOMContentLoaded', loadAccountData);
</script>

</body>
</html>
