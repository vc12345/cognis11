<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Cognis11</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    
    <script src="../js/auth-guard.js"></script>
    <script src="../js/nav-injector.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div>
                <h1>Cognis11 <span style="font-weight: 200;">Master Schema</span></h1>
                <p id="user-welcome">Syncing your progress...</p>
            </div>
            <div id="expiry-notice" style="font-size: 0.8rem; text-align: right; color: #94a3b8;">
                Account Status: <span id="account-status" style="font-weight: bold; color: #f59e0b;">Checking...</span>
            </div>
        </header>

        <main id="lattice-root">
            </main>
    </div>

    <script src="../js/registry.js"></script>
    <script>
        async function loadDashboard() {
            // 1. Get Logged-in User (Updated to supabaseClient)
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) return; // Should be handled by auth-guard

            document.getElementById('user-welcome').innerText = `Welcome, ${user.email}`;

            // 2. Fetch Subscription Status from 'profiles' table
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('subscription_status')
                .eq('id', user.id)
                .single();

            if (profile) {
                const statusEl = document.getElementById('account-status');
                const status = profile.subscription_status || 'inactive';
                
                statusEl.innerText = status.charAt(0).toUpperCase() + status.slice(1);
                
                // Color coding for status
                if (status === 'active') {
                    statusEl.style.color = '#10b981'; // Green
                } else {
                    statusEl.style.color = '#ef4444'; // Red
                }
            }

            // 3. Fetch Completed Modules (Updated to supabaseClient)
            const { data: completedData } = await supabaseClient
                .from('module_progress')
                .select('module_id')
                .eq('user_id', user.id);

            const completedIds = completedData ? completedData.map(item => item.module_id) : [];

            // 4. Render the 59-Module Lattice
            const root = document.getElementById('lattice-root');
            root.innerHTML = ''; // Clear existing content
            
            const pillars = [...new Set(COGNIS_MODULES.map(m => m.pillar))];

            pillars.forEach(pillarName => {
                const section = document.createElement('section');
                section.className = 'pillar-section';
                
                section.innerHTML = `
                    <div class="pillar-header">
                        <div style="width: 4px; height: 24px; background: var(--pillar-${pillarName.toLowerCase()})"></div>
                        ${pillarName}
                    </div>
                    <div class="category-group" id="group-${pillarName}"></div>
                `;
                
                root.appendChild(section);
                const groupContainer = document.getElementById(`group-${pillarName}`);

                COGNIS_MODULES.filter(m => m.pillar === pillarName).forEach(mod => {
                    const isDone = completedIds.includes(mod.id);
                    const card = document.createElement('a');
                    
                    card.className = `module-card ${isDone ? 'module-done' : ''}`;
                    card.href = mod.path;
                    
                    card.innerHTML = `
                        <span class="category-tag">Category ${mod.cat} ${isDone ? '✅' : ''}</span>
                        <span class="module-title">${mod.title}</span>
                        <span class="module-id" style="${isDone ? 'color: #059669;' : ''}">MOD-${String(mod.id).padStart(2, '0')}</span>
                    `;
                    groupContainer.appendChild(card);
                });
            });
        }

        // Run on load
        loadDashboard();
    </script>
</body>
</html>
