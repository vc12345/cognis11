<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Module 18: BODMAS — The Hardened Shield | Cognis11</title>
    <style>
        :root { --cognis-blue: #002d5b; --cognis-gold: #c5a059; --cognis-light: #f4f7f9; --shield-blue: #6366f1; }
        body { font-family: 'Segoe UI', sans-serif; background: #eaeff2; padding: 40px 20px; color: #2c3e50; }
        .module-card { max-width: 1000px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden; }
        
        .header { background: var(--cognis-blue); color: white; padding: 25px 40px; border-bottom: 4px solid var(--cognis-gold); }
        .header h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        
        .phase { padding: 35px 40px; border-bottom: 1px solid #edf2f7; }
        .phase h2 { font-size: 0.8rem; color: var(--cognis-gold); text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }

        /* Projection Styling */
        .simulation-area { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 50px; margin: 30px 0; text-align: center; }
        .eq-projection { font-size: 2.8rem; font-weight: bold; color: var(--cognis-blue); letter-spacing: 2px; line-height: 1.2; }
        
        /* The Shield Visual */
        .shield-bracket { color: var(--shield-blue); font-weight: 900; }
        .shield-content { background: rgba(99, 102, 241, 0.08); border-top: 3px solid var(--shield-blue); border-bottom: 3px solid var(--shield-blue); padding: 5px 0; margin: 0 2px; }

        /* Engine Layout */
        .engine-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; background: #1a202c; color: white; padding: 30px; border-radius: 12px; }
        .builder-strip { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .term-card { background: #2d3748; padding: 12px; border-radius: 8px; border: 2px solid transparent; text-align: center; }
        .term-card.is-shielded { border-color: var(--shield-blue); background: #1e1b4b; }
        
        input, select { background: #1a202c; color: white; border: 1px solid #4a5568; padding: 6px; border-radius: 4px; width: 55px; font-weight: bold; text-align: center; }
        .shield-toggle { display: block; margin-top: 8px; font-size: 0.6rem; cursor: pointer; background: #4a5568; color: white; padding: 4px; border-radius: 4px; border: none; text-transform: uppercase; width: 100%; }
        .shield-toggle.active { background: var(--shield-blue); }

        .solve-btn { width: 100%; background: #48bb78; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 25px; }
        .trace-log { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 8px; font-family: 'Consolas', monospace; border-left: 4px solid var(--cognis-gold); min-height: 150px; }
    </style>
</head>
<body>

<div class="module-card">
    <div class="header"><h1>Module 18: BODMAS — Hierarchical Shielding</h1></div>

    <section class="phase">
        <h2>Phase 1: The X-Ray</h2>
        <div class="question-tiers">
            <div class="tier-card"><span>Entry</span>$15 - (3 + 2)$</div>
            <div class="tier-card"><span>Standard</span>$(10 \times 2) + 5^2 \div 5$</div>
            <div class="tier-card"><span>Advanced</span>$144 \div [ (2 + 4) \times 2 ]^2$</div>
        </div>
    </section>

    <section class="phase">
        <h2>Phase 2: The Anatomy</h2>
        <div class="simulation-area">
            <div id="eq-output" class="eq-projection"></div>
            <p id="final-res" style="margin-top:25px; font-size:1.8rem; color:var(--cognis-gold); font-weight:bold;"></p>
        </div>
    </section>

    <section class="phase">
        <h2>Phase 3: The Engine</h2>
        <div class="engine-container">
            <div>
                <div class="builder-strip" id="builder-ui"></div>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button onclick="addTerm()" style="background:var(--cognis-gold); border:none; color:white; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">+ Add Term</button>
                    <button onclick="removeTerm()" style="background:#4a5568; border:none; color:white; padding:10px 20px; border-radius:6px; cursor:pointer;">- Remove</button>
                </div>
                <button class="solve-btn" onclick="executeBODMAS()">Execute Priority Scan</button>
            </div>
            <div class="trace-log" id="trace-output">
                Brackets (Shields) create isolated sub-equations.
            </div>
        </div>
    </section>
</div>

<script>
    // LogicProvider is assumed to be in logic-provider.js
    let equation = [
        { val: 10, op: '^', shielded: false },
        { val: 2, op: '+', shielded: true },
        { val: 3, op: null, shielded: true }
    ];

    function render() {
        const builder = document.getElementById('builder-ui');
        const projection = document.getElementById('eq-output');
        builder.innerHTML = '';
        let projHTML = '';

        equation.forEach((t, i) => {
            // Builder UI
            const card = document.createElement('div');
            card.className = `term-card ${t.shielded ? 'is-shielded' : ''}`;
            card.innerHTML = `
                <input type="number" value="${t.val}" oninput="updateVal(${i}, this.value)">
                ${t.op ? `<select onchange="updateOp(${i}, this.value)">
                    <option value="+" ${t.op==='+'?'selected':''}>+</option>
                    <option value="-" ${t.op==='-'?'selected':''}>-</option>
                    <option value="x" ${t.op==='x'?'selected':''}>×</option>
                    <option value="/" ${t.op==='/'?'selected':''}>÷</option>
                    <option value="^" ${t.op==='^'?'selected':''}>^</option>
                </select>` : ''}
                <button class="shield-toggle ${t.shielded?'active':''}" onclick="toggleShield(${i})">Shield</button>
            `;
            builder.appendChild(card);

            // Projection Logic (Strict Boundaries)
            const isStart = t.shielded && (i === 0 || !equation[i-1].shielded);
            const isEnd = t.shielded && (i === equation.length - 1 || !equation[i+1].shielded);

            if (isStart) projHTML += `<span class="shield-bracket">(</span><span class="shield-content">`;
            
            projHTML += `${t.val} `;
            
            if (t.op) {
                if (isEnd) {
                    // Close the shield BEFORE the operator
                    projHTML += `</span><span class="shield-bracket">)</span> ${t.op} `;
                } else {
                    // Operator is inside the shield
                    projHTML += `${t.op} `;
                }
            } else {
                // Last term
                if (isEnd) projHTML += `</span><span class="shield-bracket">)</span>`;
            }
        });

        projection.innerHTML = projHTML;
    }

    function toggleShield(i) { equation[i].shielded = !equation[i].shielded; render(); }
    function updateVal(i, v) { equation[i].val = v; render(); }
    function updateOp(i, o) { equation[i].op = o; render(); }
    function addTerm() {
        if(equation.length > 0 && !equation[equation.length-1].op) equation[equation.length-1].op = '+';
        equation.push({ val: 5, op: null, shielded: false });
        render();
    }
    function removeTerm() {
        if(equation.length > 1) {
            equation.pop();
            equation[equation.length-1].op = null;
            render();
        }
    }

    function executeBODMAS() {
        // Construct clean string for the solver
        let rawStr = '';
        equation.forEach((t, i) => {
            const isStart = t.shielded && (i === 0 || !equation[i-1].shielded);
            const isEnd = t.shielded && (i === equation.length - 1 || !equation[i+1].shielded);
            if(isStart) rawStr += '( ';
            rawStr += t.val + ' ';
            if(t.op) {
                if(isEnd) rawStr += ') ' + t.op + ' ';
                else rawStr += t.op + ' ';
            } else if(isEnd) rawStr += ') ';
        });

        const result = LogicProvider.modules.bodmas.solveWithBrackets(rawStr);
        document.getElementById('trace-output').innerHTML = result.steps.map(s => `<div style="margin-bottom:8px;">→ ${s}</div>`).join('');
        document.getElementById('final-res').innerText = `Result: ${result.finalRes}`;
    }

    render();
</script>
</body>
</html>
