<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try the Lattice · Cognis11</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy:#1B3A5C; --steel:#2E6DA4; --gold:#c5a059; 
            --cream:#FAFAF6; --lgrey:#E2E8F0; --dgrey:#334155; 
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'DM Sans', sans-serif; background:var(--cream); color:var(--dgrey); overflow-x: hidden; }

        .sample-nav { 
            background: #fff; 
            padding: 15px 32px; 
            border-bottom: 1px solid var(--lgrey); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .brand { font-family:'Playfair Display', serif; font-size:1.1rem; color:var(--navy); font-weight:700; text-decoration:none; }
        .btn-gold { 
            background: var(--gold); 
            color: #fff; 
            padding: 10px 20px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .tab-section { max-width: 1000px; margin: 40px auto 20px; padding: 0 20px; text-align: center; }
        .tab-intro { font-size: 0.85rem; color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        .tab-container { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 30px; }
        .tab-btn {
            background: #fff;
            border: 1px solid var(--lgrey);
            padding: 14px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--navy);
            transition: all 0.3s ease;
        }
        .tab-btn span { display: block; font-size: 0.65rem; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
        .tab-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); transform: translateY(-2px); }
        .tab-btn.active span { color: rgba(255,255,255,0.7); }

        .module-viewport { max-width: 1100px; margin: 0 auto; min-height: 800px; }
        iframe { width: 100%; height: 1300px; border: none; transition: opacity 0.3s ease; }

        .bottom-cta { background: var(--navy); color: #fff; padding: 80px 40px; text-align: center; margin-top: 60px; }
        .bottom-cta h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 15px; }
        footer { padding: 40px; text-align: center; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="sample-nav">
    <a href="index.html" class="brand">Cognis11</a>
    <a href="subscribe.html" class="btn-gold">Unlock All 59 Modules</a>
</nav>

<div class="tab-section">
    <div class="tab-intro">Experience the Learning Lattice</div>
    <div class="tab-container">
        <button class="tab-btn active" onclick="loadSample(this, 'members/module-11.html')">
            <span>Branch B: Motion & Time</span>
            Average Speed Logic
        </button>
        <button class="tab-btn" onclick="loadSample(this, 'members/module-47.html')">
            <span>Branch I: 3D Manipulation</span>
            Cube Net Mapping
        </button>
        <button class="tab-btn" onclick="loadSample(this, 'members/module-53.html')">
            <span>Branch J: Comprehension</span>
            Implicit Inference
        </button>
    </div>
</div>

<main class="module-viewport">
    <iframe id="sample-frame" src="members/module-11.html"></iframe>
</main>

<section class="bottom-cta">
    <h2>Ready to build genuine understanding?</h2>
    <p style="margin-bottom:30px; opacity:0.8;">Join thousands of parents moving from pattern-matching to deep reasoning.</p>
    <a href="subscribe.html" class="btn-gold" style="padding: 20px 40px;">View Subscription Plans</a>
</section>

<footer>© 2026 Cognis11</footer>

<script>
    function loadSample(btn, path) {
        const frame = document.getElementById('sample-frame');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        frame.style.opacity = '0';
        setTimeout(() => {
            frame.src = path;
            frame.onload = () => { frame.style.opacity = '1'; window.scrollTo({ top: 250, behavior: 'smooth' }); };
        }, 200);
    }
</script>
</body>
</html>
