<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Cognis 11+</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
    
    <style>
        /* NEW PROGRESS INDICATOR STYLES */
        .progress-indicator-row {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .progress-box {
            height: 6px;
            flex: 1;
            background: #e2e8f0;
            border-radius: 2px;
            transition: background 0.4s ease;
        }

        .progress-box.filled {
            background: var(--cognis-gold);
        }

        .module-card.is-locked {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(1);
        }

        .status-badge.status-active { background: #dcfce7; color: #166534; }
        .status-badge.status-inactive { background: #fee2e2; color: #991b1b; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/nav-injector.js"></script>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="dashboard-container">
        <header class="welcome-section">
            <div class="header-left">
                <h1 id="user-greeting">Learning Lattice</h1>
                <div class="status-bar">
                    <span id="user-welcome">Syncing your progress...</span>
                    <span class="dot-separator">•</span>
                    <span id="account-status" class="status-badge status-checking">Checking Status</span>
                </div>
            </div>
        </header>

        <main id="lattice-root"></main>
    </div>

    <script src="../js/registry-a.js"></script>
    <script>
        const expandAcronym = (name) => {
            const map = {
                "Math": "Core Maths",
                "VR": "Verbal Reasoning",
                "NVR": "Non-Verbal Reasoning",
                "English": "English Literacy"
            };
            return map[name] || name;
        };

        async function loadDashboard() {
            if (!window.supabaseClient) {
                setTimeout(loadDashboard, 100);
                return;
            }

            try {
                const { data: { user } } = await window.supabaseClient.auth.getUser();
                if (!user) { window.location.href = "/login.html"; return; }
                document.getElementById('user-welcome').innerText = user.email;

                const { data: profile } = await window.supabaseClient
                    .from('profiles')
                    .select('subscription_status, subscription_plan')
                    .eq('id', user.id)
                    .maybeSingle();

                let userPlan = 'foundational'; // Default fallback
                if (profile) {
                    userPlan = profile.subscription_plan || 'foundational';
                    const status = profile.subscription_status || 'inactive';
                    const statusEl = document.getElementById('account-status');
                    statusEl.innerText = `${status.toUpperCase()} PLAN: ${userPlan.toUpperCase()}`;
                    statusEl.className = `status-badge status-${status}`;
                }

                // Fetch progress as strings (to match "11-p" format)
                const { data: completedData } = await window.supabaseClient
                    .from('module_progress')
                    .select('module_id')
                    .eq('user_id', user.id);

                const completedSet = new Set(completedData ? completedData.map(item => String(item.module_id)) : []);

                const root = document.getElementById('lattice-root');
                root.innerHTML = ''; 
                
                const pillars = [...new Set(COGNIS_MODULES.map(m => m.pillar))];

                pillars.forEach(pillarName => {
                    const section = document.createElement('section');
                    section.className = 'pillar-section';
                    section.innerHTML = `
                        <div class="pillar-header">
                            <span class="pillar-indicator" style="background: var(--pillar-${pillarName.toLowerCase()})"></span>
                            <h2>${expandAcronym(pillarName)}</h2>
                        </div>
                        <div class="category-grid" id="group-${pillarName}"></div>
                    `;
                    root.appendChild(section);
                    
                    const groupContainer = document.getElementById(`group-${pillarName}`);

                    COGNIS_MODULES.filter(m => m.pillar === pillarName).forEach(mod => {
                        const isFoundationalDone = completedSet.has(String(mod.fID));
                        const isMasteryDone = completedSet.has(String(mod.sID));
                        
                        let isLocked = false;
                        let cardDone = false;

                        if (userPlan === 'supplemental') {
                            // Supplemental Plan: Mastery ID (sID) determines completion and sequential unlock
                            cardDone = isMasteryDone;
                            if (mod.id > 1) {
                                const prevMod = COGNIS_MODULES.find(m => m.id === mod.id - 1);
                                if (prevMod && !completedSet.has(String(prevMod.sID))) {
                                    isLocked = true;
                                }
                            }
                        } else {
                            // Foundational Plan: fID determines completion. Sequential unlock REMOVED.
                            cardDone = isFoundationalDone;
                            isLocked = false; 
                        }

                        // Progress indicators (boxes)
                        let progressHTML = '';
                        if (userPlan === 'supplemental') {
                            // 2 Boxes: Box 1 = Foundation, Box 2 = Mastery
                            progressHTML = `
                                <div class="progress-indicator-row">
                                    <div class="progress-box ${isFoundationalDone ? 'filled' : ''}"></div>
                                    <div class="progress-box ${isMasteryDone ? 'filled' : ''}"></div>
                                </div>
                            `;
                        } else {
                            // 1 Box: Foundation
                            progressHTML = `
                                <div class="progress-indicator-row">
                                    <div class="progress-box ${isFoundationalDone ? 'filled' : ''}"></div>
                                </div>
                            `;
                        }

                        const card = document.createElement(isLocked ? 'div' : 'a');
                        card.className = `module-card ${cardDone ? 'is-complete' : ''} ${isLocked ? 'is-locked' : ''}`;
                        if (!isLocked) card.href = mod.path;
                        
                        card.innerHTML = `
                            <div class="card-top">
                                <span class="cat-tag">Category ${mod.cat}</span>
                                ${cardDone ? '<span class="check-mark">✓</span>' : ''}
                                ${isLocked ? '<span class="lock-tag">Locked 🔒</span>' : ''}
                            </div>
                            <h3 class="mod-title">${mod.title}</h3>
                            <div class="card-bottom">
                                <div style="width: 100%;">
                                    <span class="mod-id">MODULE ${String(mod.id).padStart(2, '0')}</span>
                                    ${progressHTML}
                                </div>
                            </div>
                        `;
                        groupContainer.appendChild(card);
                    });
                });
            } catch (err) {
                console.error("Dashboard Render Error:", err);
            }
        }
        loadDashboard();
    </script>
</body>
</html>
