<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Cognis11</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/nav-injector.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div>
                <h1>Cognis11 <span style="font-weight: 200;">Master Schema</span></h1>
                <p id="user-welcome">Syncing your progress...</p>
            </div>
            <div id="expiry-notice" style="font-size: 0.8rem; text-align: right; color: #94a3b8;">
                Account Status: <span id="account-status">Checking...</span>
            </div>
        </header>

        <main id="lattice-root">
            </main>
    </div>

    <script src="../js/registry.js"></script>
    <script>
        async function loadDashboard() {
            // 1. Get Logged-in User
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                document.getElementById('user-welcome').innerText = `Welcome, ${user.email}`;
                document.getElementById('account-status').innerText = "Active Scholar";
            }

            // 2. Fetch Completed Modules from Database
            const { data: completedData, error } = await supabase
                .from('module_progress')
                .select('module_id')
                .eq('user_id', user.id);

            // Create a simple list of completed IDs: [1, 4, 12...]
            const completedIds = completedData ? completedData.map(item => item.module_id) : [];

            // 3. Render the 59-Module Lattice
            const root = document.getElementById('lattice-root');
            const pillars = [...new Set(COGNIS_MODULES.map(m => m.pillar))];

            pillars.forEach(pillarName => {
                const section = document.createElement('section');
                section.className = 'pillar-section';
                
                section.innerHTML = `
                    <div class="pillar-header">
                        <div style="width: 4px; height: 24px; background: var(--pillar-${pillarName.toLowerCase()})"></div>
                        ${pillarName}
                    </div>
                    <div class="category-group" id="group-${pillarName}"></div>
                `;
                
                root.appendChild(section);
                const groupContainer = document.getElementById(`group-${pillarName}`);

                COGNIS_MODULES.filter(m => m.pillar === pillarName).forEach(mod => {
                    const isDone = completedIds.includes(mod.id);
                    const card = document.createElement('a');
                    
                    // Add 'module-done' class if they finished it
                    card.className = `module-card ${isDone ? 'module-done' : ''}`;
                    card.href = mod.path;
                    
                    card.innerHTML = `
                        <span class="category-tag">Category ${mod.cat} ${isDone ? '✅' : ''}</span>
                        <span class="module-title">${mod.title}</span>
                        <span class="module-id" style="${isDone ? 'color: #059669;' : ''}">MOD-${String(mod.id).padStart(2, '0')}</span>
                    `;
                    groupContainer.appendChild(card);
                });
            });
        }

        // Initialize
        loadDashboard();
    </script>
</body>
</html>
